name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.11"
  UV_COMPILE_BYTECODE: "1"
  UV_LINK_MODE: "copy"
  UV_SYSTEM_PYTHON: "0"

jobs:
  web:
    name: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web lint
      - run: pnpm --filter web check
      - run: pnpm --filter web test
      - run: pnpm --filter web build

  worker-lint:
    name: worker-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          src: worker
          version: "0.15.11"
      - name: Ruff format check
        run: ruff format --check .
        working-directory: worker

  worker-test:
    name: worker-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: worker/uv.lock
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache uv venv
        uses: actions/cache@v4
        with:
          path: worker/.venv
          key: uv-venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('worker/uv.lock') }}
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - run: uv sync --frozen
        working-directory: worker
      - name: Pytest (all markers)
        run: uv run pytest -m "slow or not slow" --maxfail=1
        working-directory: worker

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: worker/uv.lock
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache uv venv
        uses: actions/cache@v4
        with:
          path: worker/.venv
          key: uv-venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('worker/uv.lock') }}
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - run: uv sync --frozen
        working-directory: worker
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web build
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm --filter tests exec playwright install --with-deps chromium webkit
      - run: pnpm --filter tests test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: tests/test-results/
          retention-days: 14
